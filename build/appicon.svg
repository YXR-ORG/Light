<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ff9500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff9500" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="160" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Light rays (8 rays) -->
  <polygon points="308.0,262.0 308.0,250.0 456.0,256.0"
    fill="#ffe066" opacity="0.7" filter="url(#softblur)"/>
  <polygon points="288.5269119345812,297.01219330881975 297.01219330881975,288.5269119345812 397.4213562373095,397.4213562373095"
    fill="#ffe066" opacity="0.4" filter="url(#softblur)"/>
  <polygon points="250.0,308.0 262.0,308.0 256.0,456.0"
    fill="#ffe066" opacity="0.7" filter="url(#softblur)"/>
  <polygon points="214.98780669118023,288.5269119345812 223.4730880654188,297.01219330881975 114.57864376269052,397.4213562373095"
    fill="#ffe066" opacity="0.4" filter="url(#softblur)"/>
  <polygon points="204.0,250.0 204.0,262.0 56.0,256.0"
    fill="#ffe066" opacity="0.7" filter="url(#softblur)"/>
  <polygon points="223.4730880654188,214.98780669118023 214.98780669118023,223.4730880654188 114.57864376269046,114.57864376269052"
    fill="#ffe066" opacity="0.4" filter="url(#softblur)"/>
  <polygon points="262.0,204.0 250.0,204.0 255.99999999999997,56.0"
    fill="#ffe066" opacity="0.7" filter="url(#softblur)"/>
  <polygon points="297.01219330881975,223.4730880654188 288.5269119345812,214.98780669118023 397.4213562373095,114.57864376269046"
    fill="#ffe066" opacity="0.4" filter="url(#softblur)"/>

  <!-- Inner glow ring -->
  <circle cx="256" cy="256" r="72" fill="none" stroke="#ffe066" stroke-width="2" opacity="0.3"/>

  <!-- Core bright circle -->
  <circle cx="256" cy="256" r="52" fill="url(#core)"/>
  <circle cx="256" cy="256" r="28" fill="#ffffff" opacity="0.95"/>

  <!-- Specular highlight -->
  <circle cx="244" cy="244" r="10" fill="#ffffff" opacity="0.6"/>
</svg>
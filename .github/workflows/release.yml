name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Build macOS universal
        run: wails build -platform darwin/universal

      - name: Package
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent Light.app Light-mac-universal.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: build/bin/Light-mac-universal.zip

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Build Windows
        run: wails build -platform windows/amd64

      - name: Package
        run: |
          cd build/bin
          Compress-Archive -Path Light.exe -DestinationPath Light-windows-amd64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/Light-windows-amd64.zip

  release:
    name: Create Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-build

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Light ${{ github.ref_name }}
          body: |
            ## Light ${{ github.ref_name }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon + Intel) | `Light-mac-universal.zip` |
            | Windows 64位 | `Light-windows-amd64.zip` |

            > Windows 版需要 [WebView2 Runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/)（Windows 11 已内置）
          files: |
            Light-mac-universal.zip
            Light-windows-amd64.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
